services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: basileia_vendas
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret
    volumes:
      - basileia_pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "8000"
    volumes:
      - ./backend:/var/www/html
    environment:
      - DB_CONNECTION=pgsql
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_DATABASE=basileia_vendas
      - DB_USERNAME=postgres
      - DB_PASSWORD=secret
    depends_on:
      - postgres

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - NEXT_PUBLIC_API_URL=${BACKEND_URL:-http://backend:8000}
    depends_on:
      - backend
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.basileia-frontend.rule=Host(`vendor.basileia.global`)"
      - "traefik.http.routers.basileia-frontend.entrypoints=websecure"
      - "traefik.http.routers.basileia-frontend.tls.certresolver=letsencrypt"
      - "traefik.http.services.basileia-frontend.loadbalancer.server.port=3000"
    networks:
      - default
      - web

networks:
  web:
    external: true

volumes:
  basileia_pgdata:
