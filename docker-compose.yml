services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: basileia_vendas
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret
    volumes:
      - basileia_pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "8000"
    environment:
      - APP_ENV=production
      - APP_DEBUG=true
      - APP_URL=https://vendor.basileia.global
      - DB_CONNECTION=pgsql
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_DATABASE=basileia_vendas
      - DB_USERNAME=postgres
      - DB_PASSWORD=secret
    depends_on:
      - postgres

volumes:
  basileia_pgdata:
