services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: basileia_vendas
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret
    volumes:
      - basileia_pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "8000"
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - APP_URL=https://vendor.basileia.global
      - APP_KEY=${APP_KEY}
      - DB_CONNECTION=pgsql
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_DATABASE=basileia_vendas
      - DB_USERNAME=postgres
      - DB_PASSWORD=secret
      - SESSION_DRIVER=database
      - CACHE_STORE=database
      - QUEUE_CONNECTION=database
    depends_on:
      - postgres
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.basileia.rule=Host(`vendor.basileia.global`)"
      - "traefik.http.routers.basileia.entrypoints=websecure"
      - "traefik.http.routers.basileia.tls.certresolver=letsencrypt"
      - "traefik.http.services.basileia.loadbalancer.server.port=8000"
    networks:
      - default
      - web

networks:
  web:
    external: true

volumes:
  basileia_pgdata:
