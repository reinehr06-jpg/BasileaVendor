services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: basileia_vendas
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret
    volumes:
      - basileia_pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    expose:
      - "8000"
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - APP_KEY=base64:nlLQ85gujQx+RhDcoo/D22uAI8yy01HIlmul8mH8YUU=
      - APP_URL=https://vendor.basileia.global
      - DB_CONNECTION=pgsql
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_DATABASE=basileia_vendas
      - DB_USERNAME=postgres
      - DB_PASSWORD=secret
      - QUEUE_CONNECTION=database
      - CACHE_STORE=file
    volumes:
      - basileia_storage:/var/www/html/storage
      - basileia_logs:/var/log
    depends_on:
      - postgres

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3005:3000"
    environment:
      - NEXT_PUBLIC_API_URL=https://vendor.basileia.global/api
    depends_on:
      - backend

volumes:
  basileia_pgdata:
  basileia_storage:
  basileia_logs:
